# SCLib_JZIS Nginx snippet for VPS2 (72.62.251.29).
#
# Install:
#   cp nginx/sclib.conf /etc/nginx/conf.d/sclib.conf
#   nginx -t && systemctl reload nginx
#
# PLUS: append the `location /sclib` block below into the existing
#       jzis.org server block in /etc/nginx/sites-available/jzis.org.
#       (It cannot live in conf.d because it must be inside the
#       existing jzis.org server {} block.)
#
# ---------------------------------------------------------------------
# BLOCK 1 — append inside /etc/nginx/sites-available/jzis.org
# ---------------------------------------------------------------------
#
# location /sclib {
#     # Next.js standalone frontend — docker-compose binds sclib-frontend
#     # to 127.0.0.1:3100 (NOT 3000, which is asrp.jzis.org on VPS2).
#     proxy_pass http://127.0.0.1:3100;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_set_header Upgrade $http_upgrade;
#     proxy_set_header Connection 'upgrade';
#     proxy_cache_bypass $http_upgrade;
# }
#
# ---------------------------------------------------------------------
# BLOCK 2 — below: new api.jzis.org server blocks (lives in conf.d)
# ---------------------------------------------------------------------

# Per-IP rate limit zone shared across all SCLib API requests. 10r/s
# sustained, burst 20, matches human-scale interactive traffic while
# blocking obvious scraping. The FastAPI guest quota (3/day) lives
# behind this and is the real business limit.
limit_req_zone $binary_remote_addr zone=sclib_api:10m rate=10r/s;

server {
    server_name api.jzis.org;

    # Baseline security headers for the API. CSP is restrictive —
    # API responses are JSON, no script should ever execute from
    # this origin.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    # Preserve the /sclib/v1 path prefix on the upstream FastAPI app.
    # (FastAPI is mounted at root; Nginx strips /sclib/ so /sclib/v1/search
    # becomes /v1/search upstream. FastAPI's router uses /v1/* paths.)
    location /sclib/ {
        limit_req zone=sclib_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # /ask hits Gemini which can take longer than a generic API
    # request. Give it a dedicated location with a 180s read timeout
    # so long generations don't trip Nginx's 504.
    location = /sclib/v1/ask {
        limit_req zone=sclib_api burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000/v1/ask;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # /stats/refresh is the internal admin hook. Never expose it
    # to the public — the Phase 5 cron calls the upstream directly
    # over loopback (127.0.0.1:8000) and does not go through Nginx.
    location = /sclib/v1/stats/refresh {
        deny all;
        return 404;
    }

    # Reasonable request body size for future uploads (PDFs etc.)
    client_max_body_size 20m;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.jzis.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.jzis.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name api.jzis.org;
    return 301 https://$host$request_uri;
}
