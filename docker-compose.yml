services:
  frontend:
    build:
      context: ./frontend
      # GIT_SHA defaults to "dev" so local `docker compose build` works
      # without setting the env. Production deploys (deploy.yml + the
      # manual VPS2 steps) export GIT_SHA=$(git rev-parse --short HEAD)
      # before invoking compose so the running image carries the real
      # commit. Surfaced on the site footer + GET /version.
      args:
        GIT_SHA: ${GIT_SHA:-dev}
    container_name: sclib-frontend
    restart: unless-stopped
    # VPS2 already runs asrp.jzis.org on host port 3000 — bind the
    # SCLib frontend to 3100 instead and point Nginx at that. Never
    # collide with existing sites, per CLAUDE.md.
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=https://api.jzis.org/sclib/v1
      # Server-side fetches (SSR in Next) take the in-cluster URL so
      # page rendering doesn't hairpin through Nginx + TLS.
      - API_BASE_SERVER=http://api:8000/v1
      - NODE_ENV=production
    # With basePath=/sclib baked in, Next.js 404s on bare / and serves
    # the app under /sclib. Probe that path for liveness.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:3000/sclib >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./api
      args:
        GIT_SHA: ${GIT_SHA:-dev}
    container_name: sclib-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - ./credentials/gcp-sa.json:/credentials/gcp-sa.json:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingestion:
    build: ./ingestion
    container_name: sclib-ingestion
    # One-shot job: invoked via `docker compose run --rm ingestion ...`,
    # never as a daemon. `profiles` keeps it out of `docker compose up`.
    profiles: ["tools"]
    env_file: .env
    volumes:
      - ./credentials/gcp-sa.json:/credentials/gcp-sa.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: sclib-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sclib
      POSTGRES_USER: sclib
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sclib -d sclib"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Internal only — no ports exposed

  redis:
    image: redis:7-alpine
    container_name: sclib-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Internal only — no ports exposed

volumes:
  postgres_data:
  redis_data:
