name: Daily arXiv ingest

on:
  schedule:
    # Twice a day in UTC+8: 14:00 (morning submissions) and 22:00 (afternoon).
    - cron: "0 6 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:

concurrency:
  group: ingest-daily
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger incremental ingest on VPS2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.251.29
          username: root
          key: ${{ secrets.VPS2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/SCLib_JZIS
            # The ingestion package lives in its own image (see
            # docker-compose.yml "ingestion" service with profiles=[tools]).
            # It is NOT installed in the api container, so exec'ing into api
            # and running python -m ingestion.pipeline fails with
            # ModuleNotFoundError. Use `compose run --rm` on the ingestion
            # profile instead — it spins up a one-shot container and cleans
            # up on exit.
            docker compose --profile tools run --rm ingestion \
              sclib-ingest --mode incremental
            # Roll the fresh NER output up into materials.records so the
            # UI reflects the new papers without waiting for a manual
            # aggregator call.
            docker compose --profile tools run --rm ingestion \
              sclib-ingest --mode aggregate-materials
